
name: C Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure
        run: cmake -S device -B device/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build device/build -j

      - name: Run tests
        run: ctest --test-dir device/build --output-on-failure
